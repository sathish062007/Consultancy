<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Sathish Overseas and Consultancy</title>
  <meta name="description" content="Register for domestic and overseas admissions for top universities.">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>
  
  <header class="hero-section">
    <div class="header-top">
      <div class="logo-wrapper">
        <a href="index.html">
          <img src="assets/logoo.jpeg" alt="Sathish Overseas Logo" class="logo">
        </a>
      </div>
      <div class="title-wrapper">
        <h1 class="main-title">SATHISH</h1>
        <h2 class="sub-title">OVERSEAS AND CONSULTANCY</h2>
        <p class="tagline">( Domestic and Overseas ) ( Education Carrier Guidance Center )</p>
        <div class="title-divider"></div>
      </div>
      <div class="nav-action">
        <a href="index.html" class="nav-btn">Back to Home</a>
      </div>
    </div>
    
    <div class="wave-shape">
      <svg data-name="Layer 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" preserveAspectRatio="none">
        <path d="M321.39,56.44c58-10.79,114.16-30.13,172-41.86,82.39-16.72,168.19-17.73,250.45-.39C823.78,31,906.67,72,985.66,92.83c70.05,18.48,146.53,26.09,214.34,3V0H0V27.35A600.21,600.21,0,0,0,321.39,56.44Z" class="shape-fill"></path>
      </svg>
    </div>
  </header>

  <main class="content-section">
    <div class="container container-center">
      <div class="registration-container">
        <div class="registration-header">
          <h2 class="highlight-text large-highlight">REGISTRATION</h2>
          <p style="margin-top: 10px; font-size: 18px;">Fill in your details below to begin your admission process</p>
        </div>

        <form action="#" method="POST" class="registration-form">
          <div class="form-group">
            <label for="name" class="form-label">Full Name</label>
            <input type="text" id="name" name="name" class="form-input" required placeholder="Enter your full name">
          </div>

          <div class="form-group">
            <label for="email" class="form-label">Email Address</label>
            <input type="email" id="email" name="email" class="form-input" required placeholder="Enter your email">
          </div>

          <div class="form-group">
            <label for="contact" class="form-label">Contact Number</label>
            <input type="tel" id="contact" name="contact" class="form-input" required placeholder="Enter your phone number">
          </div>

          <div class="form-group">
            <label for="course" class="form-label">Course Interested In</label>
            <select id="course" name="course" class="form-select" required>
              <option value="" disabled selected>Select a course</option>
              <option value="engineering">Engineering</option>
              <option value="medical">Medical</option>
              <option value="arts_science">Arts & Science</option>
              <option value="management">Management / MBA</option>
              <option value="overseas">Overseas Education</option>
              <option value="other">Other</option>
            </select>
          </div>

          <div class="form-group">
            <label for="mark10" class="form-label">10th Mark</label>
            <input type="number" id="mark10" name="mark10" class="form-input" placeholder="E.g. 450 or 90%">
          </div>

          <div class="form-group">
            <label for="mark11" class="form-label">11th Mark</label>
            <input type="number" id="mark11" name="mark11" class="form-input" placeholder="E.g. 460 or 92%">
          </div>

          <div class="form-group">
            <label for="mark12" class="form-label">12th Mark</label>
            <input type="text" id="mark12" name="mark12" class="form-input" placeholder="E.g. 580 or 96%" required>
          </div>

          <div class="form-group full-width">
             <label for="about" class="form-label">About Details / Queries</label>
             <textarea id="about" name="about" class="form-input" rows="4" placeholder="Any specific requirements or queries?"></textarea>
          </div>

          <div class="form-group full-width">
            <button type="submit" class="submit-btn" onclick="alert('Registration Successful!'); return false;">SUBMIT REGISTRATION</button>
          </div>
        </form>
      </div>
    </div>
  </main>

  <footer class="footer-section">
    <div class="container footer-container">
      <div class="contact-card">
        <div class="icon-box">
          <svg viewBox="0 0 24 24" fill="none" class="footer-icon" xmlns="http://www.w3.org/2000/svg">
            <path d="M20.01 15.38c-1.23 0-2.42-.2-3.53-.56a.977.977 0 00-1.01.24l-1.57 1.97c-2.83-1.35-5.48-3.9-6.89-6.83l1.95-1.66c.27-.28.35-.67.24-1.02-.37-1.11-.56-2.3-.56-3.53 0-.54-.45-.99-.99-.99H4.19C3.65 3 3 3.24 3 3.99 3 13.28 10.73 21 20.01 21c.71 0 .99-.63.99-1.18v-3.45c0-.54-.45-.99-.99-.99z" fill="white"/>
          </svg>
        </div>
        <div class="contact-details">
          <span class="contact-label">Contact Us</span>
          <a href="tel:8838303167" class="contact-value">8838303167</a>
        </div>
      </div>

      <div class="contact-card align-right">
        <div class="contact-details text-right">
          <span class="contact-label">Email</span>
          <a href="mailto:sksathish2871@gmail.com" class="contact-value">sksathish2871@gmail.com</a>
        </div>
        <div class="icon-box">
          <svg viewBox="0 0 24 24" fill="none" class="footer-icon" xmlns="http://www.w3.org/2000/svg">
            <path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z" fill="white"/>
          </svg>
        </div>
      </div>
    </div>
    <div class="footer-bottom-bar"></div>
  </footer>

</body>
</html>
